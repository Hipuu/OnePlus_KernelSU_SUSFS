name: Build OnePlus Nethunter kernel modules

inputs:
  op_config_json:
    description: 'JSON string containing full device config'
    required: true
  optimize_level:
    required: false
    default: O2

runs:
  using: composite
  steps:
    - name: Parse op_config_json
      shell: bash
      run: |
        set -euo pipefail
        echo '${{ inputs.op_config_json }}' > /tmp/config.json
        python3 - <<'PY' >> "$GITHUB_ENV"
import json

with open("/tmp/config.json") as fh:
    data = json.load(fh)

for key, value in data.items():
    if value is True:
        rendered = "true"
    elif value is False:
        rendered = "false"
    else:
        rendered = value
    print(f"OP_{key.upper()}={rendered}")
PY
        echo "Parsed config:"
        python3 -m json.tool /tmp/config.json

    - name: Load Nethunter helpers
      shell: bash
      run: |
        set -euo pipefail
        cp "$GITHUB_WORKSPACE/.github/scripts/nethunter-lib.sh" /tmp/nethunter-lib.sh
        chmod +x /tmp/nethunter-lib.sh

    - name: Validate Inputs
      shell: bash
      run: |
        set -euo pipefail
        [[ -n "${OP_MODEL:-}" ]] || { echo "Input 'model' cannot be empty"; exit 1; }
        [[ -n "${OP_SOC:-}" ]] || { echo "Input 'soc' cannot be empty"; exit 1; }
        [[ -n "${OP_BRANCH:-}" ]] || { echo "Input 'branch' cannot be empty"; exit 1; }
        [[ -n "${OP_MANIFEST:-}" ]] || { echo "Input 'manifest' cannot be empty"; exit 1; }
        source /tmp/nethunter-lib.sh
        family="$(nethunter_platform_family)"
        echo "OP_PLATFORM_FAMILY=$family" >> "$GITHUB_ENV"
        echo "Detected platform family: $family"
        echo "Nethunter modules strategy: ${OP_NETHUNTER_MODULES_STRATEGY:-none}"
        echo "Nethunter note: ${OP_NETHUNTER_MODULES_NOTE:-not set}"
        if nethunter_modules_supported; then
          echo "NH_MODULES_SUPPORTED=true" >> "$GITHUB_ENV"
        else
          echo "NH_MODULES_SUPPORTED=false" >> "$GITHUB_ENV"
          echo "::error::Unsupported Nethunter module strategy for ${OP_MODEL}: family=$family strategy=${OP_NETHUNTER_MODULES_STRATEGY:-none}. ${OP_NETHUNTER_MODULES_NOTE:-No strategy configured}."
          exit 1
        fi

    - name: Setup Base Environment
      if: ${{ env.NH_MODULES_SUPPORTED == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        CONFIG="$OP_MODEL"
        echo "CONFIG=$CONFIG" >> "$GITHUB_ENV"
        REPO="/usr/local/bin/repo"
        if [ ! -x "$REPO" ]; then
          curl -s https://storage.googleapis.com/git-repo-downloads/repo -o "$REPO"
          chmod +x "$REPO"
        fi
        echo "REPO=$REPO" >> "$GITHUB_ENV"

    - name: Initialize and Sync Kernel Source
      if: ${{ env.NH_MODULES_SUPPORTED == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p "$CONFIG"
        cd "$CONFIG"
        if [[ "$OP_MANIFEST" == https://* ]]; then
          mkdir -p .repo/manifests
          curl --fail --show-error --location --proto '=https' "$OP_MANIFEST" -o .repo/manifests/temp_manifest.xml
          "$REPO" init -u https://github.com/OnePlusOSS/kernel_manifest.git -b "oneplus/sm8650" -m temp_manifest.xml --repo-rev=v2.16 --depth=1 --no-clone-bundle --no-tags
        elif [[ "$OP_BRANCH" == wild/* ]]; then
          mkdir -p .repo/manifests
          cp "$GITHUB_WORKSPACE/manifests/$(echo "$OP_OS_VERSION" | tr '[:upper:]' '[:lower:]')/$OP_MANIFEST" .repo/manifests/temp_manifest.xml
          "$REPO" init -u https://github.com/OnePlusOSS/kernel_manifest.git -b "oneplus/sm8650" -m temp_manifest.xml --repo-rev=v2.16 --depth=1 --no-clone-bundle --no-tags
        else
          "$REPO" init -u https://github.com/OnePlusOSS/kernel_manifest.git -b "$OP_BRANCH" -m "$OP_MANIFEST" --repo-rev=v2.16 --depth=1 --no-clone-bundle --no-tags
        fi
        success=false
        for i in 1 2 3; do
          if "$REPO" sync -c --no-clone-bundle --no-tags --optimized-fetch -j"$(nproc --all)" --fail-fast; then
            success=true
            break
          fi
          sleep 30
        done
        $success || { echo "repo sync failed after 3 attempts"; exit 1; }

    - name: Detect layout and paths
      if: ${{ env.NH_MODULES_SUPPORTED == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        source /tmp/nethunter-lib.sh
        CONFIG_DIR="$GITHUB_WORKSPACE/$CONFIG"
        KERNEL_PLATFORM="$CONFIG_DIR/kernel_platform"
        SOURCE_ROOT="$(nethunter_source_root "$KERNEL_PLATFORM")"
        OUT_DIR="$SOURCE_ROOT/out"
        ARTIFACTS_DIR="$CONFIG_DIR/artifacts"
        mkdir -p "$ARTIFACTS_DIR"

        case "${OP_NETHUNTER_MODULES_STRATEGY}" in
          qcom_legacy_vendor)
            LAYOUT_DESC="QCOM legacy vendor tree"
            ;;
          qcom_ddk_vendor)
            LAYOUT_DESC="QCOM DDK vendor tree"
            ;;
          qcom_aosp_vendor)
            LAYOUT_DESC="QCOM AOSP/DDK vendor tree"
            ;;
          mtk_gki)
            LAYOUT_DESC="MediaTek linked GKI tree"
            ;;
          *)
            echo "::error::Unhandled strategy ${OP_NETHUNTER_MODULES_STRATEGY}"
            exit 1
            ;;
        esac

        echo "CONFIG_DIR=$CONFIG_DIR" >> "$GITHUB_ENV"
        echo "KERNEL_PLATFORM=$KERNEL_PLATFORM" >> "$GITHUB_ENV"
        echo "SOURCE_ROOT=$SOURCE_ROOT" >> "$GITHUB_ENV"
        echo "OUT_DIR=$OUT_DIR" >> "$GITHUB_ENV"
        echo "ARTIFACTS_DIR=$ARTIFACTS_DIR" >> "$GITHUB_ENV"
        echo "LAYOUT_DESC=$LAYOUT_DESC" >> "$GITHUB_ENV"
        echo "Using source root: $SOURCE_ROOT"
        echo "Layout: $LAYOUT_DESC"

    - name: Get Kernel Version Info
      if: ${{ env.NH_MODULES_SUPPORTED == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        cd "$SOURCE_ROOT"
        BRANCH_LINE=$(grep '^[[:space:]]*BRANCH=' build.config.common build.config.constants 2>/dev/null | head -n1 || true)
        [ -n "$BRANCH_LINE" ] || { echo "Error: No BRANCH= found"; exit 1; }
        BRANCH_VALUE="${BRANCH_LINE#*=}"
        ANDROID_VERSION="${BRANCH_VALUE%-*}"
        VERSION=$(grep '^VERSION *=' Makefile | awk '{print $3}')
        PATCHLEVEL=$(grep '^PATCHLEVEL *=' Makefile | awk '{print $3}')
        SUBLEVEL=$(grep '^SUBLEVEL *=' Makefile | awk '{print $3}')
        FULL_VERSION="$VERSION.$PATCHLEVEL.$SUBLEVEL"
        echo "ANDROID_VER=$ANDROID_VERSION" >> "$GITHUB_ENV"
        echo "KERNEL_VER=$VERSION.$PATCHLEVEL" >> "$GITHUB_ENV"
        echo "KERNEL_FULL_VER=$ANDROID_VERSION-$FULL_VERSION" >> "$GITHUB_ENV"

    - name: Clone Nethunter patch repo
      if: ${{ env.NH_MODULES_SUPPORTED == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        git clone --depth=1 https://github.com/nullptr-t-oss/kernel_patches.git "$GITHUB_WORKSPACE/my_patches"

    - name: Clean Up ABI Protected Exports
      if: ${{ env.NH_MODULES_SUPPORTED == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        rm -f "$SOURCE_ROOT"/android/abi_gki_protected_exports_* || true
        rm -f "$KERNEL_PLATFORM"/msm-kernel/android/abi_gki_protected_exports_* || true

    - name: Prepare defconfig
      if: ${{ env.NH_MODULES_SUPPORTED == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        source /tmp/nethunter-lib.sh
        DEFCONFIG="$SOURCE_ROOT/arch/arm64/configs/gki_defconfig"
        VENDOR_FRAGMENT="$(nethunter_vendor_fragment "$SOURCE_ROOT" "$OP_SOC" || true)"
        cd "$SOURCE_ROOT"
        make ARCH=arm64 mrproper
        mkdir -p "$OUT_DIR"
        if [[ -n "$VENDOR_FRAGMENT" ]]; then
          echo "Merging vendor fragment: $VENDOR_FRAGMENT"
          ./scripts/kconfig/merge_config.sh -O "$OUT_DIR" -m "$DEFCONFIG" "$VENDOR_FRAGMENT"
          cp "$OUT_DIR/.config" "$DEFCONFIG"
          rm -f "$OUT_DIR/.config"
        else
          echo "No vendor fragment found for soc=$OP_SOC; using plain gki_defconfig"
        fi
        apply_nethunter_module_config "$DEFCONFIG" ./scripts/config

    - name: Apply family/model specific Nethunter patches
      if: ${{ env.NH_MODULES_SUPPORTED == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        cd "$SOURCE_ROOT"
        if [ "$OP_PLATFORM_FAMILY" = "qcom" ] && [ "$OP_MODEL" = "OP11" ]; then
          for patch_file in "$GITHUB_WORKSPACE"/my_patches/kernel_patches/op11/msm/*.patch; do
            [ -f "$patch_file" ] || continue
            echo "Applying patch: $patch_file"
            patch -p1 < "$patch_file"
          done
        else
          echo "No model-specific patch set defined for ${OP_MODEL}; using generic family pipeline."
        fi

    - name: Add optional out-of-tree helper sources
      if: ${{ env.NH_MODULES_SUPPORTED == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        cd "$SOURCE_ROOT"
        if [ -d drivers/net/wireless/realtek ]; then
          cd drivers/net/wireless/realtek
          rm -rf rtw88
          git clone --depth=1 https://github.com/lwfinger/rtw88.git
          sed -i 's/$(CONFIG_RTW88)/m/g' Makefile || true
          sed -i '/^source "drivers\/net\/wireless\/realtek\/rtw88\/Kconfig"$/s/.*/ /' Kconfig || true
        else
          echo "No realtek driver directory found; skipping rtw88 injection"
        fi
        if [ "$OP_PLATFORM_FAMILY" = "qcom" ]; then
          cd "$SOURCE_ROOT"
          curl -LSs "https://raw.githubusercontent.com/Poko-Apps/MemKernel/main/kernel/setup.sh" | bash -s M br0k3n || echo "MemKernel injection skipped"
        fi

    - name: Detect Clang
      if: ${{ env.NH_MODULES_SUPPORTED == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        source /tmp/nethunter-lib.sh
        CLANG_BIN="$(nethunter_detect_clang_bin "$KERNEL_PLATFORM" || true)"
        [ -n "$CLANG_BIN" ] || { echo "No clang toolchain found"; exit 1; }
        echo "CLANG_BIN_PATH=$CLANG_BIN" >> "$GITHUB_ENV"

    - name: Build in-tree modules
      if: ${{ env.NH_MODULES_SUPPORTED == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        export PATH="${CLANG_BIN_PATH}:$PATH"
        export PATH="/usr/lib/ccache:$PATH"
        export INSTALL_MOD_PATH="$OUT_DIR"
        cd "$SOURCE_ROOT"
        make ARCH=arm64 LLVM=1 O="$OUT_DIR" gki_defconfig
        ./scripts/config --file "$OUT_DIR/.config" \
          --enable CONFIG_LTO_CLANG_THIN \
          --enable CONFIG_LTO_CLANG \
          --enable CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE \
          --disable CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE_O3
        make ARCH=arm64 LLVM=1 O="$OUT_DIR" olddefconfig
        make -j"$(nproc --all)" ARCH=arm64 LLVM=1 O="$OUT_DIR" CC="ccache clang" modules
        make -j"$(nproc --all)" ARCH=arm64 LLVM=1 O="$OUT_DIR" INSTALL_MOD_PATH="$INSTALL_MOD_PATH" modules_install

    - name: Build external vendor modules when present
      if: ${{ env.NH_MODULES_SUPPORTED == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        export PATH="${CLANG_BIN_PATH}:$PATH"
        export INSTALL_MOD_PATH="$OUT_DIR"
        cd "$KERNEL_PLATFORM"
        built_any=false
        declare -a module_paths=()

        if [ "$OP_PLATFORM_FAMILY" = "qcom" ]; then
          modules_ext_file="$KERNEL_PLATFORM/oplus/config/modules.ext.$KERNEL_VER.oplus"
          if [ -f "$modules_ext_file" ]; then
            while IFS= read -r module; do
              module="${module%%#*}"
              module="${module//[$'\t\r\n ']/}"
              [ -n "$module" ] || continue
              module_paths+=("$KERNEL_PLATFORM/$module")
            done < "$modules_ext_file"
          fi

          for module in \
            "$KERNEL_PLATFORM/vendor/oplus/kernel/explorer" \
            "$KERNEL_PLATFORM/vendor/qcom/opensource/mmrm-driver" \
            "$KERNEL_PLATFORM/vendor/qcom/opensource/mm-drivers/hw_fence" \
            "$KERNEL_PLATFORM/vendor/qcom/opensource/mm-drivers/sync_fence" \
            "$KERNEL_PLATFORM/vendor/qcom/opensource/mm-drivers/msm_ext_display" \
            "$KERNEL_PLATFORM/vendor/qcom/opensource/securemsm-kernel" \
            "$KERNEL_PLATFORM/vendor/qcom/opensource/display-drivers/msm" \
            "$KERNEL_PLATFORM/vendor/qcom/opensource/audio-kernel" \
            "$KERNEL_PLATFORM/vendor/qcom/opensource/camera-kernel" \
            "$KERNEL_PLATFORM/vendor/qcom/opensource/video-driver" \
            "$KERNEL_PLATFORM/vendor/qcom/opensource/graphics-kernel" \
            "$KERNEL_PLATFORM/vendor/qcom/opensource/dataipa/drivers/platform/msm" \
            "$KERNEL_PLATFORM/vendor/qcom/opensource/datarmnet/core" \
            "$KERNEL_PLATFORM/vendor/qcom/opensource/datarmnet-ext/aps" \
            "$KERNEL_PLATFORM/vendor/qcom/opensource/datarmnet-ext/offload" \
            "$KERNEL_PLATFORM/vendor/qcom/opensource/datarmnet-ext/shs" \
            "$KERNEL_PLATFORM/vendor/qcom/opensource/datarmnet-ext/sch" \
            "$KERNEL_PLATFORM/vendor/qcom/opensource/datarmnet-ext/perf" \
            "$KERNEL_PLATFORM/vendor/qcom/opensource/datarmnet-ext/perf_tether" \
            "$KERNEL_PLATFORM/vendor/qcom/opensource/datarmnet-ext/wlan" \
            "$KERNEL_PLATFORM/vendor/qcom/opensource/eva-kernel" \
            "$KERNEL_PLATFORM/vendor/qcom/opensource/wlan/platform" \
            "$KERNEL_PLATFORM/vendor/qcom/opensource/bt-kernel" \
            "$KERNEL_PLATFORM/vendor/nxp/opensource/driver" \
            "$KERNEL_PLATFORM/vendor/st/opensource/driver" \
            "$KERNEL_PLATFORM/vendor/st/opensource/eSE-driver"; do
            module_paths+=("$module")
          done

          declare -A seen=()
          for module in "${module_paths[@]}"; do
            [ -d "$module" ] || continue
            if [[ -n "${seen[$module]:-}" ]]; then
              continue
            fi
            seen[$module]=1
            echo "Building external module: $module"
            make -C "$module" M="$module" -j"$(nproc --all)" \
              ARCH=arm64 KERNEL_SRC="$SOURCE_ROOT" O="$OUT_DIR" LLVM=1 LLVM_IAS=1 DEPMOD=depmod DTC=dtc \
              CHIPSET_COMPANY=QCOM OPLUS_VND_BUILD_PLATFORM="$OP_SOC" modules || continue
            make -C "$module" M="$module" -j"$(nproc --all)" \
              ARCH=arm64 KERNEL_SRC="$SOURCE_ROOT" O="$OUT_DIR" LLVM=1 LLVM_IAS=1 DEPMOD=depmod DTC=dtc \
              CHIPSET_COMPANY=QCOM OPLUS_VND_BUILD_PLATFORM="$OP_SOC" INSTALL_MOD_PATH="$INSTALL_MOD_PATH" modules_install || continue
            built_any=true
          done

          if [ "$built_any" = false ]; then
            echo "::notice::No synced external QCOM vendor module directories were found for ${OP_MODEL}; shipping the in-tree Nethunter module set only."
          fi
        else
          echo "::notice::MediaTek manifests in this repo currently sync only the linked kernel tree, not separate vendor module repositories; shipping the in-tree Nethunter module set only."
        fi

    - name: Filter modules
      if: ${{ env.NH_MODULES_SUPPORTED == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        UNAME=$(basename "$(find "$OUT_DIR/lib/modules" -mindepth 1 -maxdepth 1 -type d | head -n1)")
        [ -n "$UNAME" ] || { echo "No installed modules directory found"; exit 1; }
        mkdir -p "$OUT_DIR/modules"
        find "$OUT_DIR/lib/modules/$UNAME" -type f -name '*.ko' -exec cp {} "$OUT_DIR/modules/" \;
        cd "$OUT_DIR/modules"
        curl -L -o default_modules.txt https://raw.githubusercontent.com/nullptr-t-oss/kernel_patches/refs/heads/main/default_modules.txt
        while IFS= read -r module; do
          module="${module%%#*}"
          module="${module//[$'\r\n']/}"
          [ -n "$module" ] || continue
          rm -f "$module"
        done < default_modules.txt

    - name: Create Kernel Modules zip
      if: ${{ env.NH_MODULES_SUPPORTED == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        MODULES_SRC="$OUT_DIR/modules"
        MODULES_ZIP="$ARTIFACTS_DIR/kernel_modules_${OP_MODEL}_${OP_OS_VERSION}.zip"
        find "$MODULES_SRC" -type f -name '*.ko' -print0 | xargs -0 zip -j "$MODULES_ZIP"

    - name: Upload Kernel Modules zip
      if: ${{ env.NH_MODULES_SUPPORTED == 'true' }}
      uses: actions/upload-artifact@v4
      with:
        name: kernel-modules-${{ env.OP_MODEL }}_${{ env.OP_OS_VERSION }}
        path: ${{ env.ARTIFACTS_DIR }}/
